name: Flake Review (Reusable)

on:
  workflow_call:
    inputs:
      flake-review-ref:
        description: "flake-review git ref to install (tag, branch, or SHA)"
        type: string
        default: "main"
      install-from-checkout:
        description: "Install flake-review from the checked-out repo (for testing PRs to flake-review itself)"
        type: boolean
        default: false
      matrix:
        description: "JSON array of {runner, systems, name} objects"
        type: string
        default: '[{"runner":"macos-latest","systems":"aarch64-darwin,x86_64-darwin","name":"darwin"},{"runner":"ubuntu-latest","systems":"x86_64-linux","name":"linux"},{"runner":"ubuntu-24.04-arm","systems":"aarch64-linux","name":"linux-arm"}]'
      max-workers:
        description: "Max parallel build workers"
        type: number
        default: 4
      packages:
        description: "Comma-separated list of packages to review (default: all changed packages)"
        type: string
        required: false
      concurrency-group:
        description: "Concurrency group for cancelling outdated runs"
        type: string
        required: false
      pr-url:
        description: "PR URL to review (defaults to the triggering pull_request event)"
        type: string
        default: ${{ github.event.pull_request.html_url }}
      cachix-cache:
        description: "Cachix cache name to push successful builds to"
        type: string
        required: false
      cachix-skip-substituter:
        description: "Don't add the cachix cache as a substituter (push-only); set to false to also pull from it"
        type: boolean
        default: true
    secrets:
      cachix-auth-token:
        description: "Cachix auth token (push is skipped when absent, e.g. on fork PRs)"
        required: false
concurrency:
  group: ${{ inputs.concurrency-group || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

jobs:
  review:
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3.21.0
        with:
          extra-conf: |
            extra-experimental-features = nix-command flakes
      - uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          use-flakehub: false
      - name: Set up Cachix
        if: inputs.cachix-cache
        uses: cachix/cachix-action@v17
        with:
          name: ${{ inputs.cachix-cache }}
          authToken: ${{ secrets.cachix-auth-token }}
          # flake-review pushes successful builds itself via --cachix
          skipPush: true
          skipAddingSubstituter: ${{ inputs.cachix-skip-substituter }}
      - name: Install nix-diff
        run: |
          nix profile add nixpkgs#nix-diff
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - &install-flake-review
        name: Install flake-review
        env:
          FLAKE_REVIEW_REF: ${{ inputs.flake-review-ref }}
        run: |
          if [ "${{ inputs.install-from-checkout }}" = "true" ]; then
            pip install . --quiet
          else
            pip install "git+https://github.com/ojsef39/flake-review.git@${FLAKE_REVIEW_REF}" --quiet
          fi
      - name: Review ${{ matrix.name }} packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGES: ${{ inputs.packages }}
          PR_URL: ${{ inputs.pr-url }}
          CACHIX_CACHE: ${{ inputs.cachix-cache }}
          CACHIX_AUTH_TOKEN: ${{ secrets.cachix-auth-token }}
        run: |
          if [ -z "$PR_URL" ]; then
            echo "::error::pr-url input is empty and no pull_request event context is available." >&2
            exit 1
          fi
          pkg_args=()
          if [ -n "$PACKAGES" ]; then
            IFS=',' read -ra pkgs <<< "$PACKAGES"
            for p in "${pkgs[@]}"; do
              pkg_args+=(--package "$p")
            done
          fi
          cachix_args=()
          if [ -n "$CACHIX_CACHE" ] && [ -n "$CACHIX_AUTH_TOKEN" ]; then
            cachix_args=(--cachix "$CACHIX_CACHE")
          elif [ -n "$CACHIX_CACHE" ]; then
            echo "::notice::cachix-auth-token not available (fork PR?); skipping cachix push."
          fi
          flake-review pr \
            "$PR_URL" \
            --systems ${{ matrix.systems }} \
            --max-workers ${{ inputs.max-workers }} \
            --output-file ${{ matrix.name }}-report.json \
            --output-format json \
            "${pkg_args[@]}" \
            "${cachix_args[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.name }}-report
          path: ${{ matrix.name }}-report.json

  post-results:
    needs: [review]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: reports
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - *install-flake-review
      - name: Merge and post results
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_URL: ${{ inputs.pr-url }}
        run: |
          if [ -z "$PR_URL" ]; then
            echo "::error::pr-url input is empty and no pull_request event context is available." >&2
            exit 1
          fi
          if [[ ! "$PR_URL" =~ /pull/([0-9]+)(/|$|[?#]) ]]; then
            echo "::error::pr-url does not look like a GitHub PR URL: $PR_URL" >&2
            exit 1
          fi
          PR_NUMBER="${BASH_REMATCH[1]}"
          shopt -s nullglob
          json_files=(reports/*/*.json)
          if [ "${#json_files[@]}" -eq 0 ]; then
            echo "No report files found - no packages changed across all platforms."
            exit 0
          fi
          flake-review merge-reports \
            "${json_files[@]}" \
            --title "Flake Review Results for [#${PR_NUMBER}](${PR_URL})" \
            --post-result \
            --pr-url "$PR_URL"
      - name: Fail if any review job failed
        if: needs.review.result != 'success' && needs.review.result != 'skipped'
        run: |
          echo "One or more review matrix jobs did not succeed (result: ${{ needs.review.result }})"
          exit 1
