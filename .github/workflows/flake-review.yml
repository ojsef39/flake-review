# Flake-review testing itself via the reusable workflow.
# Installs from the checked-out repo to test the PR's code.
#
# For other repos, use:
#   uses: ojsef39/flake-review/.github/workflows/flake-review-reusable.yml@main

name: Flake Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr-url:
        description: "PR URL to review"
        type: string
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    uses: ./.github/workflows/flake-review-reusable.yml
    with:
      install-from-checkout: true
      concurrency-group: ${{ github.workflow }}-${{ github.event.pull_request.number || inputs.pr-url || github.ref }}
      pr-url: ${{ inputs.pr-url || github.event.pull_request.html_url }}
